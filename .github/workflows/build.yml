name: Build (iPhone-only backdoor)

# Builds BOTH sides in the cloud. You never compile anything.
#   - iOS: unsigned .ipa  -> install on phone via TrollStore (no Mac, no PC, no cert)
#   - Windows: receiver.exe + iphonecamera.ax -> download, run on the PC
# Trigger: push to main, develop, or feature/**, or run manually from the Actions tab.

on:
  push:
    branches: [main, develop, 'feature/**']
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes and get faster feedback.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved', 'shared/**', 'tests/**') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: TDD - SwiftPM protocol + unit tests
        run: swift test

      - name: TDD - C protocol header test
        run: cc -Iprotocol tests/protocol_test.c -o /tmp/ptest && /tmp/ptest

      - name: Benchmark - protocol pack/unpack
        run: cc -Iprotocol benchmarks/protocol_bench.c -o /tmp/pbench && /tmp/pbench

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('ios/**/*.swift', 'ios/**/*.h', 'ios/**/*.pbxproj', 'ios/**/*.xcassets/**', 'shared/**/*') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      # No `clean` so the DerivedData cache stays warm; Debug is faster than Release.
      - name: Build unsigned app
        run: |
          xcodebuild build \
            -project ios/iPhoneCameraStream.xcodeproj \
            -target iPhoneCameraStream \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            BUILD_DIR="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA (TrollStore-ready)
        run: |
          APP=$(find "$PWD/build" -name 'iPhoneCameraStream.app' -maxdepth 6 | head -1)
          echo "APP=$APP"
          [ -n "$APP" ] || { echo "ERROR: iPhoneCameraStream.app not found in build output"; find "$PWD/build" -maxdepth 3; exit 1; }
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r iPhoneCameraStream.ipa Payload
          ls -lh iPhoneCameraStream.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: iPhoneCameraStream-ipa
          path: iPhoneCameraStream.ipa

  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      # cache:true reuses installed packages; update:false skips the slow repo refresh.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          cache: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-libusbmuxd
            mingw-w64-x86_64-pkg-config
            git
            make

      - name: Fetch DirectShow BaseClasses
        run: |
          git clone --depth 1 https://github.com/microsoft/Windows-classic-samples
          echo "BASECLASSES_DIR=$(pwd)/Windows-classic-samples/Samples/Win7Samples/multimedia/directshow/baseclasses" >> $GITHUB_ENV

      - name: Build receiver.exe (transport test)
        run: |
          LIBS="$(pkg-config --libs libavcodec libavutil libswscale libusbmuxd-2.0 2>/dev/null)"
          [ -z "$LIBS" ] && LIBS="$(pkg-config --libs libavcodec libavutil libswscale libusbmuxd 2>/dev/null)"
          [ -z "$LIBS" ] && LIBS="-lavcodec -lswscale -lavutil -lusbmuxd"
          g++ -std=c++20 -O2 \
            -I"$BASECLASSES_DIR" -I"$BASECLASSES_DIR/.." \
            -I"${{ github.workspace }}/protocol" \
            "${{ github.workspace }}/windows/receiver.cpp" \
            -o receiver.exe \
            $LIBS \
            -lws2_32
          ls -lh receiver.exe

      # DirectShow BaseClasses (Microsoft, MSVC-designed) is not MinGW-friendly:
      # it relies on SAL annotations + MSVC intrinsics (NULL -> __null, etc.) that
      # MinGW-w64 does not provide, so iphonecamera.ax cannot be built with g++ here.
      # This step is best-effort; the canonical fix is to build the .ax with MSVC
      # (cl.exe + Windows SDK + vcpkg ffmpeg/libusbmuxd) — tracked in feature/obs.
      # receiver.exe (the transport/decode path) builds and is the validated deliverable.
      - name: Build iphonecamera.ax (best-effort, MSVC-only)
        continue-on-error: true
        run: |
          set +e
          LIBS="$(pkg-config --libs libavcodec libavutil libswscale libusbmuxd-2.0 2>/dev/null)"
          [ -z "$LIBS" ] && LIBS="$(pkg-config --libs libavcodec libavutil libswscale libusbmuxd 2>/dev/null)"
          [ -z "$LIBS" ] && LIBS="-lavcodec -lswscale -lavutil -lusbmuxd"
          g++ -std=gnu++20 -O2 -shared -DNOMINMAX -fpermissive \
            -I"$BASECLASSES_DIR" -I"$BASECLASSES_DIR/.." \
            -I"${{ github.workspace }}/protocol" \
            -include "${{ github.workspace }}/windows/sal_shim.h" \
            "${{ github.workspace }}/windows/virtual_camera.cpp" \
            -o iphonecamera.ax \
            $LIBS \
            -lws2_32 -ld3d11 -lstrmiids -lstrmbase
          ls -lh iphonecamera.ax 2>/dev/null || echo "AX_BUILD_SKIPPED (needs MSVC)"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          if-no-files-found: ignore
          path: |
            receiver.exe
            iphonecamera.ax
